<!DOCTYPE html>
<html>
<head>
  <title>Void Archive</title>
  <style>
    body {
      background: black;
      color: #00ff9f;
      font-family: monospace;
      text-align: center;
      padding-top: 10%;
    }
    input, button {
      background: black;
      color: #00ff9f;
      border: 1px solid #00ff9f;
      padding: 10px;
      margin: 5px;
    }
    .glitch {
      animation: flicker 0.15s infinite;
    }
    @keyframes flicker {
      0% { opacity: 0.8; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
  </style>
</head>
<body>

<h1 class="glitch">[ CREATE TRANSMISSION ]</h1>

<input id="urlInput" placeholder="https://example.com" size="40">
<br>
<button onclick="generate()">ENCODE</button>

<p id="result"></p>

<script>

// ENCODE (hex + reverse)
function encodeUrl(url) {
  let hex = "";
  for (let i = 0; i < url.length; i++) {
    hex += url.charCodeAt(i).toString(16);
  }
  return hex.split("").reverse().join("");
}

function generate() {
  const url = document.getElementById("urlInput").value.trim();

  if (!url.startsWith("http")) {
    alert("Enter valid http/https URL");
    return;
  }

  const encoded = encodeUrl(url);

  // IMPORTANT: always go to /info/
  const link = window.location.origin + "/info/?c=" + encoded;

  document.getElementById("result").innerHTML =
    `<a href="${link}">${link}</a>`;
}

</script>

</body>
</html>
