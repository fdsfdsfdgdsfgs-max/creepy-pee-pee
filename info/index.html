<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
</head>
<body style="background:black; color:#00ff9f; font-family:monospace; text-align:center; padding-top:10%;">
<p id="status">Decrypting signal...</p>

<script>
function decodeUrl(encoded) {
  const reversed = encoded.split("").reverse().join("");
  let str = "";

  for (let i = 0; i < reversed.length; i += 2) {
    str += String.fromCharCode(parseInt(reversed.substr(i, 2), 16));
  }

  return str;
}

// ✅ GET FROM QUERY STRING
const params = new URLSearchParams(window.location.search);
const encoded = params.get("c");

if (!encoded) {
  document.getElementById("status").innerText = "No signal found.";
} else {
  try {
    const decoded = decodeUrl(encoded);

    document.getElementById("status").innerText =
      "Redirecting to: " + decoded;

    setTimeout(() => {
      window.location.replace(decoded);
    }, 500);

  } catch (e) {
    document.getElementById("status").innerText =
      "[ SIGNAL CORRUPTED ]";
  }
}
</script>

</body>
</html>
